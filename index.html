<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深蓝 · 冲日凌日</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <div class="header-title">深蓝 · 冲日凌日</div>
    <div class="grid-layout">
        <div class="canvas-wrapper">
            <canvas id="simCanvas" width="800" height="800"></canvas>
        </div>
        <div class="right-panel">
            <div class="mode-group">
                <button class="mode-btn active" data-mode="opposition">火星冲日</button>
                <button class="mode-btn" data-mode="transit">金星凌日</button>
            </div>
            <div class="info-card">
                <div class="info-item"><span class="info-label">状态</span><span class="info-value" id="statusDisplay">—</span></div>
                <div class="info-item"><span class="info-label">距离</span><span class="info-value" id="distanceDisplay">0.52 AU</span></div>
                <div class="info-item"><span class="info-label">日期</span><span class="info-value special" id="dateDisplay">2026-06-16</span></div>
            </div>
            <div class="pos-indicator">
                <span>共线位置</span>
                <span class="pos-tag" id="pos1">火星—地球—太阳</span>
                <span class="pos-tag" id="pos2">火星—太阳—地球</span>
                <span class="pos-tag" id="pos3">地球—太阳—火星</span>
                <span class="pos-tag" id="pos4">太阳—地球—火星</span>
            </div>

            <div class="control-row">
                <input type="range" id="timeSlider" min="0" max="1000" value="500" step="0.1">
                <span class="time-label" id="dayCounter">Day 0</span>
                <button class="action-btn" id="playPauseBtn">播放</button>
                <button class="action-btn" id="resetBtn">重置</button>
                <button class="action-btn" id="predictBtn">查找事件</button>
            </div>

            <div class="control-row" style="justify-content:space-between;">
                <div class="speed-control">
                    <span>速度</span>
                    <input type="range" id="speedSlider" min="1" max="200" step="1" value="30">
                    <span id="speedDisplay">30</span>
                    <span>天/秒</span>
                </div>
                <div class="date-range">
                    <span>范围</span>
                    <input type="date" id="startDate" value="2026-06-01">
                    <span>→</span>
                    <input type="date" id="endDate" value="2035-09-15">
                    <button class="action-btn" id="applyRangeBtn">应用</button>
                </div>
            </div>

            <div class="calc-box" id="calcBox">
                <span class="close-calc" id="calcClose">×</span>
                <div class="calc-box-title">事件详情</div>
                <div id="calcContent"></div>
            </div>
        </div>
    </div>
</div>

<!-- Tweaks Panel -->
<div class="tweaks-toggle" id="tweaksToggle" title="调整参数">⚙</div>
<div class="tweaks-panel" id="tweaksPanel">
    <div class="tweaks-header">
        <span>参数调整</span>
        <span class="tweaks-close" id="tweaksClose">×</span>
    </div>
    <div class="tweaks-body">
        <label class="tweak-row">
            <span>星点密度</span>
            <input type="range" id="tweakStars" min="100" max="1200" value="600" step="50">
            <span class="tweak-val" id="tweakStarsVal">600</span>
        </label>
        <label class="tweak-row">
            <span>辉光强度</span>
            <input type="range" id="tweakGlow" min="50" max="200" value="100" step="5">
            <span class="tweak-val" id="tweakGlowVal">100%</span>
        </label>
        <label class="tweak-row">
            <span>暗角浓度</span>
            <input type="range" id="tweakVignette" min="0" max="100" value="55" step="5">
            <span class="tweak-val" id="tweakVignetteVal">55%</span>
        </label>
        <label class="tweak-row">
            <span>轨道线透明度</span>
            <input type="range" id="tweakOrbits" min="20" max="100" value="100" step="5">
            <span class="tweak-val" id="tweakOrbitsVal">100%</span>
        </label>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
